name: Build & Push Docker images

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-client:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./client
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/buzzer-client:latest
            ghcr.io/${{ github.repository_owner }}/buzzer-client:${{ github.sha }}
          build-args: |
            VITE_PORT=3000
            VITE_INSTANCE_URL=${{ secrets.CLIENT_URL }}
            VITE_SERVER_URL=${{ secrets.API_URL }}
            VITE_SERVER_SOCKET_URL=${{ secrets.API_URL }}
            VITE_SEND_PINGS=true
          cache-from: type=gha,scope=client
          cache-to: type=gha,scope=client,mode=max

  build-server:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./server
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/buzzer-server:latest
            ghcr.io/${{ github.repository_owner }}/buzzer-server:${{ github.sha }}
          cache-from: type=gha,scope=server
          cache-to: type=gha,scope=server,mode=max
